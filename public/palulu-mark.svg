<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apartamentos Palulu">
  <defs>
    <linearGradient id="pl-g" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2f80ed"/>
      <stop offset="1" stop-color="#1554b8"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="88" height="88" rx="22" fill="url(#pl-g)"/>
  <!-- torre izquierda -->
  <rect x="24" y="34" width="20" height="40" rx="2.5" fill="#ffffff" opacity="0.96"/>
  <!-- torre derecha (mas alta) -->
  <rect x="50" y="22" width="22" height="52" rx="2.5" fill="#ffffff"/>
  <!-- ventanas torre izquierda -->
  <g fill="#1554b8">
    <rect x="28" y="40" width="5" height="5" rx="1"/>
    <rect x="36" y="40" width="5" height="5" rx="1"/>
    <rect x="28" y="49" width="5" height="5" rx="1"/>
    <rect x="36" y="49" width="5" height="5" rx="1"/>
    <rect x="28" y="58" width="5" height="5" rx="1"/>
    <rect x="36" y="58" width="5" height="5" rx="1"/>
  </g>
  <!-- ventanas torre derecha -->
  <g fill="#2f80ed">
    <rect x="55" y="29" width="5.5" height="5.5" rx="1"/>
    <rect x="63.5" y="29" width="5.5" height="5.5" rx="1"/>
    <rect x="55" y="39" width="5.5" height="5.5" rx="1"/>
    <rect x="63.5" y="39" width="5.5" height="5.5" rx="1"/>
    <rect x="55" y="49" width="5.5" height="5.5" rx="1"/>
    <rect x="63.5" y="49" width="5.5" height="5.5" rx="1"/>
    <rect x="55" y="59" width="5.5" height="5.5" rx="1"/>
    <rect x="63.5" y="59" width="5.5" height="5.5" rx="1"/>
  </g>
  <!-- base -->
  <rect x="20" y="72" width="56" height="6" rx="3" fill="#ffffff"/>
</svg>
