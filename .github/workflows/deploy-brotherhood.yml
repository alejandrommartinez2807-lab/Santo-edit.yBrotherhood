name: Deploy Brotherhood

# Deploy MANUAL de Brotherhood a producción (Vercel). No se dispara solo en cada
# push: se lanza a mano desde GitHub → Actions → "Deploy Brotherhood" → Run
# workflow. Así evitamos publicaciones accidentales. Requiere los secrets
# VERCEL_TOKEN, VERCEL_ORG_ID y VERCEL_PROJECT_ID (ver docs/DESPLIEGUE.md).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: brotherhood-publico

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar Vercel CLI
        run: npm i -g vercel@latest

      - name: Descargar configuración de Vercel
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build de producción
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Publicar a producción
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
